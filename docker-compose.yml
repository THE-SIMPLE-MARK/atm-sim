name: atm-sim-dev

volumes:
  postgres:

x-database-url: &database-url
  DATABASE_URL: postgres://postgres:postgres@postgres:5432/atm-sim?sslmode=disable

services:
  postgres:
    image: postgres:17
    restart: "unless-stopped"
    environment:
      POSTGRES_DB: atm-sim
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - 5432:5432
    volumes:
      - postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrations:
    build:
      dockerfile: backend/Dockerfile.migrations
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *database-url
    restart: "no"

  backend:
    build:
      dockerfile: backend/Dockerfile
    depends_on:
      migrations:
        condition: service_completed_successfully
    restart: "unless-stopped"
    environment:
      <<: *database-url
    ports:
      - 3000:3000



